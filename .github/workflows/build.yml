name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The library ships no app entry point (no src/main.cpp), so it cannot be
  # linked on its own. CI compiles each example as the sketch through the
  # repo's own PlatformIO environments.
  examples-lmx2:
    name: Compile LMX2 examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build every example sketch
        run: |
          set -e
          for f in examples/*/*.ino; do
            echo "::group::$f"
            cp "$f" src/main.cpp
            pio run -e lmx2
            echo "::endgroup::"
          done
          rm -f src/main.cpp

  # Nothing else exercises the LMX1 backend, so compile a minimal sketch against
  # it to keep that translation unit (and its FastLED path) building. The
  # examples-lmx2 job already covers the effects layer on LMX2; build the
  # effects-enabled examples here too so the LMX1 effects path (FastLED blur2d +
  # crossfade) is exercised as well, and a plain sketch to cover effects-off.
  smoke-lmx1:
    name: Smoke-compile LMX1 backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build a minimal LMX1 sketch (effects off)
        run: |
          set -e
          cat > src/main.cpp <<'SKETCH'
          #include <Arduino.h>
          #include "WuaDisplay_LMX.h"
          WuaDisplay display(7);
          void setup() { display.begin(); display.clear(); display.printAligned("Hi"); display.flush(); }
          void loop() { display.update(); }
          SKETCH
          pio run -e lmx1
          rm -f src/main.cpp
      - name: Build the effects-enabled examples on LMX1
        run: |
          set -e
          for f in examples/Crossfade/Crossfade.ino examples/Blur/Blur.ino; do
            echo "::group::$f"
            cp "$f" src/main.cpp
            pio run -e lmx1
            echo "::endgroup::"
          done
          rm -f src/main.cpp
