name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The library ships no app entry point (no src/main.cpp), so it cannot be
  # linked on its own. CI compiles each example as the sketch through the
  # repo's own PlatformIO environments.
  examples-lmx2:
    name: Compile LMX2 examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build every example sketch
        run: |
          set -e
          for f in examples/*/*.ino; do
            echo "::group::$f"
            cp "$f" src/main.cpp
            pio run -e lmx2
            echo "::endgroup::"
          done
          rm -f src/main.cpp

  # The LMX2d backend (two AW20216S chips on one PCB -> 12x12) is not covered by
  # the examples above, so compile a minimal sketch that exercises the full
  # high-level API against it to keep that translation unit building.
  smoke-lmx2d:
    name: Smoke-compile LMX2d backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build a minimal LMX2d sketch
        run: |
          set -e
          cat > src/main.cpp <<'SKETCH'
          // Exercises the full Panel contract (setBrightness + blur via the
          // effects layer, on top of text/scroll) so a missing member is caught.
          #define WUA_ENABLE_EFFECTS
          #include <Arduino.h>
          #include <SPI.h>
          #include "WuaDisplay_LMX.h"
          WuaDisplay display(10, 1); // two AW20216S chips: CS 10 (left) and CS 1 (right)
          void setup() {
            SPI.begin();
            display.begin();
            display.setBrightness(200);
            display.clear();
            display.printAligned("Hi");
            display.flush();
            display.applyBlur(64);
            display.flush();
            display.startScroll("LMX2d");
          }
          void loop() { display.update(); }
          SKETCH
          pio run -e lmx2d
          rm -f src/main.cpp

  # Nothing else exercises the LMX1 backend, so compile a minimal sketch against
  # it to keep that translation unit (and its FastLED path) building. The
  # examples-lmx2 job already covers these on LMX2; build the LMX1-specific
  # examples here too so the LMX1 paths (FastLED blur2d + crossfade, and the
  # FastLED brightness scale) are exercised as well, plus a plain sketch to
  # cover effects-off.
  smoke-lmx1:
    name: Smoke-compile LMX1 backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build a minimal LMX1 sketch (effects off)
        run: |
          set -e
          cat > src/main.cpp <<'SKETCH'
          #include <Arduino.h>
          #include "WuaDisplay_LMX.h"
          WuaDisplay display(7);
          void setup() { display.begin(); display.clear(); display.printAligned("Hi"); display.flush(); }
          void loop() { display.update(); }
          SKETCH
          pio run -e lmx1
          rm -f src/main.cpp
      - name: Build the LMX1-specific examples on LMX1
        run: |
          set -e
          for f in examples/Crossfade/Crossfade.ino examples/Blur/Blur.ino examples/Brightness/Brightness.ino; do
            echo "::group::$f"
            cp "$f" src/main.cpp
            pio run -e lmx1
            echo "::endgroup::"
          done
          rm -f src/main.cpp

  # The LMX1p backend is fixed-geometry (no module count), so it has no example
  # of its own; compile a minimal sketch that exercises the full Panel contract
  # (setBrightness + blur via the effects layer) against it.
  smoke-lmx1p:
    name: Smoke-compile LMX1p backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build a minimal LMX1p sketch
        run: |
          set -e
          cat > src/main.cpp <<'SKETCH'
          // Exercises the full Panel contract (setBrightness + blur via the
          // effects layer, on top of text/scroll) so a missing member is caught.
          #define WUA_ENABLE_EFFECTS
          #include <Arduino.h>
          #include "WuaDisplay_LMX.h"
          WuaDisplay display;
          void setup() {
            display.begin();
            display.setBrightness(200);
            display.clear();
            display.printAligned("Hi");
            display.flush();
            display.applyBlur(64);
            display.flush();
            display.startScroll("LMX1p");
          }
          void loop() { display.update(); }
          SKETCH
          pio run -e lmx1p
          rm -f src/main.cpp
