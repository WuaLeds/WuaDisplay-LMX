; WuaDisplay-LMX -- two-layer display library.
; Each environment selects the Layer 1 pixel backend at compile time and pulls
; in only that backend's dependency.

[platformio]
default_envs = lmx1

[env]
platform = espressif32
board = esp32-c3-devkitc-02
framework = arduino
build_flags = -std=gnu++17
build_unflags = -std=gnu++11
lib_deps =
    adafruit/Adafruit GFX Library

; ---- LMX1: N chained 7x18 SK6812 modules (FastLED) ----
[env:lmx1]
build_flags =
    ${env.build_flags}
    -D WUA_BOARD_LMX1
build_src_filter = +<*> -<LMX2.cpp> -<LMX2D.cpp>
lib_deps =
    ${env.lib_deps}
    fastled/FastLED

; ---- LMX2: single 6x12 AW20216S RGB matrix (SPI) ----
[env:lmx2]
build_flags =
    ${env.build_flags}
    -D WUA_BOARD_LMX2
build_src_filter = +<*> -<LMX1.cpp> -<LMX2D.cpp>
lib_deps =
    ${env.lib_deps}
    Wualeds_AW20216S

; ---- LMX2d: one PCB with two AW20216S chips -> 12x12 (SPI, 2 CS) ----
[env:lmx2d]
build_flags =
    ${env.build_flags}
    -D WUA_BOARD_LMX2D
build_src_filter = +<*> -<LMX1.cpp> -<LMX2.cpp>
lib_deps =
    ${env.lib_deps}
    Wualeds_AW20216S
